name: Update Knowledge

on:
  schedule:
    - cron: '0 6 * * 1'       # Weekly Monday 06:00 UTC
  workflow_dispatch:            # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install repomix
        run: npm install -g repomix

      - name: Update Godot knowledge
        run: cd domains/godot/scripts && bash update.sh --no-index

      - name: Commit changes (if any)
        run: |
          if git diff --quiet -- .agents/skills/godot/references/; then
            echo "No changes — knowledge is up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/skills/godot/references/
          git commit -m "chore(godot): auto-update knowledge from upstream [skip ci]"
          git push
